name: CI

# Trigger on every push to a feature branch + every PR to main. Without
# the feature-branch push trigger, CI never runs for in-flight branches and
# the only signal a branch is broken is "wait until PR time and see it
# fail" — too late to fix cheaply. The branch list intentionally mirrors
# the conventional-commit prefixes we use, so `chore/*`, `release/*`,
# and `docs/*` all pick up CI too.
on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
      - 'release/**'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build + vitest (Node ${{ matrix.node-version }}, windows-latest)
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        # Match the engines field: >=22.5.0 <25.0.0. CodeGraph uses the
        # built-in node:sqlite API, which is only available from Node 22.5+.
        node-version: [22]
        # Windows-only: this project's primary target is Microsoft Access / VBA
        # (Dysflow-corpus workflows, Access binary integration, Access-specific
        # extraction paths in src/extraction/vba-*.ts). The remaining surface
        # (TS / Python / Go / tree-sitter cross-language stuff) is Node.js
        # and SQLite — both fully Windows-compatible — so an Ubuntu matrix leg
        # adds CI minutes without exercising anything the Windows leg doesn't
        # already cover. Drop it; revisit if/when a Linux-specific failure
        # mode appears in production.
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm
        run: npm install -g pnpm@10.16.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (tsc + copy assets)
        run: pnpm run build

      - name: Run vitest
        run: pnpm test

      - name: Run E2E regression (extract-vba-realfixtures)
        run: pnpm exec vitest run __tests__/extraction-vba-realfixtures.test.ts
